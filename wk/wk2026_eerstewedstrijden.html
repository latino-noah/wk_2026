<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WK 2026 – Weekschema Groepsfase</title>

</head>
<link rel="stylesheet" href="style.css">
<body>
<header>
  <div class="wk-title">⚽ WK 2026 — Weekschema Groepsfase</div>
  <div class="wk-sub">11 – 17 juni 2026 · UEFA · CONMEBOL · AFC · CAF · Alle tijden in CEST (Nederlandse tijd)</div>
</header>
<div class="stat-bar">
  <div class="stat-box"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Wedstrijden</div></div>
  <div class="stat-box"><div class="stat-num" style="color:#60a5fa" id="stat-uefa">—</div><div class="stat-label">UEFA</div></div>
  <div class="stat-box"><div class="stat-num" style="color:#34d399" id="stat-con">—</div><div class="stat-label">CONMEBOL</div></div>
  <div class="stat-box"><div class="stat-num" style="color:#fb923c" id="stat-afc">—</div><div class="stat-label">AFC</div></div>
  <div class="stat-box"><div class="stat-num" style="color:#f472b6" id="stat-caf">—</div><div class="stat-label">CAF</div></div>
</div>
<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:#60a5fa"></div> UEFA</div>
  <div class="leg"><div class="leg-dot" style="background:#34d399"></div> CONMEBOL</div>
  <div class="leg"><div class="leg-dot" style="background:#fb923c"></div> AFC</div>
  <div class="leg"><div class="leg-dot" style="background:#f472b6"></div> CAF</div>
  <div class="leg"><div class="leg-dot" style="background:#a5b4fc"></div> 1e wedstrijd</div>
  <div class="leg"><div class="leg-dot" style="background:#c084fc"></div> 2e wedstrijd</div>
</div>
<div class="filter-bar">
  <button class="filter-btn active" onclick="filterConf('all',this)">Alle</button>
  <button class="filter-btn" onclick="filterConf('UEFA',this)">UEFA</button>
  <button class="filter-btn" onclick="filterConf('CONMEBOL',this)">CONMEBOL</button>
  <button class="filter-btn" onclick="filterConf('AFC',this)">AFC</button>
  <button class="filter-btn" onclick="filterConf('CAF',this)">CAF</button>
</div>
<div id="schedule"></div>

<div style="text-align:center;margin-top:24px;font-size:0.7rem;color:var(--muted)">
  +1 = volgende dag Nederlandse tijd · Scoren: UEFA 1×, CONMEBOL 2×, CAF 1×, AFC 1×
</div>
<script src="script.js"></script>
</body>
</html>
